# Clave única de tu proyecto
sonar.projectKey=Java2303_AgroControl
sonar.organization=java2303

# Fuentes: Incluimos el backend Y las carpetas del frontend (app y components)
sonar.sources=backend/src,app,components
sonar.tests=backend/src/__test__

# Configuración analítica de reportes
sonar.test.inclusions=backend/src/__test__/**/*.test.js

# CORRECCIÓN: El reporte de Jest se genera en la raíz del proyecto
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusiones de carpetas basura, librerías y archivos de configuración
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,backend/package-lock.json,package-lock.json,pnpm-lock.yaml