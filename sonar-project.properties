# Clave única de tu proyecto
sonar.projectKey=Java2303_AgroControl
sonar.organization=java2303

# Rutas corregidas apuntando a la subcarpeta backend
sonar.sources=backend/src
sonar.tests=backend/src/__test__

# Configuración analítica de reportes
sonar.test.inclusions=backend/src/__test__/**/*.test.js
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Exclusiones de carpetas basura y librerías
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,backend/package-lock.json