# Clave única de tu proyecto
sonar.projectKey=Java2303_AgroControl
sonar.organization=java2303

# Ubicación del código fuente ante la raíz del contenedor de GitHub
sonar.sources=desarrollo/src

# Ubicación EXACTA de tus pruebas unitarias ante la raíz del contenedor
sonar.tests=desarrollo/src/__test__

# Excluir el archivo de prueba del conteo de líneas de código fuente duplicadas
sonar.test.inclusions=desarrollo/src/__test__/**/*.test.js

# Ruta al reporte de cobertura generado por Jest para que SonarCloud lo absorba
sonar.javascript.lcov.reportPaths=desarrollo/coverage/lcov.info

# Archivos y directorios excluidos del análisis estático de código
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,desarrollo/package-lock.json