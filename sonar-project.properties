# Clave única de tu proyecto
sonar.projectKey=Java2303_AgroControl
sonar.organization=java2303

# Ubicación del código fuente (donde están tus controladores, utils, etc.)
sonar.sources=src

# Ubicación EXACTA de tus pruebas (la carpeta que sí existe en tu proyecto)
sonar.tests=src/__test__

# Excluir el archivo de prueba del conteo de líneas de código fuente duplicadas
sonar.test.inclusions=src/__test__/**/*.test.js

# Indicarle a Sonar dónde va a encontrar el reporte de cobertura de pruebas
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Archivos que no queremos que Sonar analice de forma estática
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,package-lock.json